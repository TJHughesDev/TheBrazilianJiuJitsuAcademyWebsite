{{define "cta-strip"}}
<section class="section cta-strip{{if .BgImage}} cta-strip--image{{end}}"{{if .BgImage}} style="background-image: linear-gradient(rgba(13,11,12,0.82), rgba(13,11,12,0.82)), url('{{.BgImage}}');"{{end}}>
  <div class="container">
    {{if .Label}}<p class="label label--light text-center">{{.Label}}</p>{{end}}
    <h2 class="section-title section-title--light text-center" style="margin-bottom: 12px;">{{.Title}}</h2>
    {{if .Body}}<p class="cta-strip__body">{{.Body}}</p>{{end}}
    <a href="{{.BtnHref}}" class="btn btn--red btn--lg">{{.BtnText}}</a>
  </div>
</section>
{{end}}
